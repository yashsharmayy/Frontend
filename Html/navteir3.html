<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav</title>
    <style>
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      /* Main menu */
      nav > ul {
        display: flex;
        background: black;
      }

      nav li {
        position: relative;
        padding: 10px;
        color: white;
      }

      /* Hide all submenus */
      li ul {
        display: none;
        position: absolute;
        background: gray;
      }

      /* Show submenu on hover */
      li:hover > ul {
        display: block;
      }

      /* Position 2nd level */
      li ul {
        top: 100%;
        left: 0;
      }

      /* Position 3rd level */
      li ul li ul {
        top: 0;
        left: 100%;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li>Home</li>

        <li>
          Products
          <ul>
            <li>
              Clothing
              <ul>
                <li>Men</li>
                <li>Women</li>
              </ul>
            </li>
            <li>Electronics</li>
          </ul>
        </li>

        <li>Contact</li>
      </ul>
    </nav>
  </body>
</html>
