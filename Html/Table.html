<!doctype html>
<html>
  <head>
    <title>Table Example</title>

    <style>
      body {
        background-color: #fae6ff;
        font-family: Arial;
      }

      h1 {
        color: #4a148c;
        text-align: center;
      }

      .container {
        width: 80%;
        margin: auto;
        padding: 20px;
        background-color: #ffffff;
        border: 6px solid #6a1b9a;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        border: 3px solid #003366;
      }

      th {
        background-color: #f0b3fb;
        border: 2px solid #003366;
        padding: 10px;
        color: #000;
      }

      td {
        border: 2px solid #003366;
        padding: 10px;
        text-align: center;
        background-color: #f2f9ff;
      }

      ul {
        margin-top: 20px;
      }

      li {
        color: #003366;
      }
    </style>
  </head>

  <body>
    <h1>Table Table</h1>

    <div class="container">
      <table>
        <tr>
          <th colspan="4">Seminar</th>
        </tr>

        <tr>
          <th rowspan="2">Day</th>
          <th colspan="2">Schedule</th>
          <th rowspan="2">Topic</th>
        </tr>

        <tr>
          <th>Start Time</th>
          <th>End Time</th>
        </tr>

        <tr>
          <td rowspan="2">Monday</td>
          <td rowspan="2">8:00 AM</td>
          <td rowspan="2">5:00 PM</td>
          <td>Introduction to HTML</td>
        </tr>
        <tr>
          <td>Important HTML Tags</td>
        </tr>

        <tr>
          <td rowspan="3">Tuesday</td>
          <td>8:00 AM</td>
          <td>11:00 AM</td>
          <td rowspan="2">CSS-1</td>
        </tr>
        <tr>
          <td>11:00 AM</td>
          <td>2:00 PM</td>
        </tr>
        <tr>
          <td>2:00 PM</td>
          <td>5:00 PM</td>
          <td>JavaScript-1</td>
        </tr>

        <tr>
          <td>Wednesday</td>
          <td>8:00 AM</td>
          <td>12 Noon</td>
          <td>JavaScript-2</td>
        </tr>

        <tr>
          <td rowspan="2">Thursday</td>
          <td>8:00 AM</td>
          <td>12 Noon</td>
          <td>JQuery</td>
        </tr>
        <tr>
          <td>1:00 PM</td>
          <td>3:00 PM</td>
          <td>Valedictory</td>
        </tr>
      </table>
    </div>
  </body>
</html>
