<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pyqs2</title>
  </head>
  <body>
    <script>
      function goToSite() {
        let site = document.getElementById("sites");
        window.location.href = site.value;
      }
    </script>
    <h3>Select a Website:</h3>

    <select id="sites" onchange="goToSite()">
      <option value="">--Select--</option>
      <option value="https://www.google.com">Google</option>
      <option value="https://www.msbte.org.in">MSBTE</option>
      <option value="https://www.yahoo.com">Yahoo</option>
    </select>
  </body>
</html>
