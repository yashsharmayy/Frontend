<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pys4</title>
    <style>
      form {
        border: 2px solid black;
        padding: 50px;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <script>
      function alertfun() {
        alert("You have focused on the input element!");
      }
    </script>
    <form action="">
      <h3>Click on the input box:</h3>

      text
      <input type="text" onfocus="alertfun()" />
    </form>
  </body>
</html>
