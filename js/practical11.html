<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>practical_11</title>
    <style>
      form {
        border: 2px solid black;
        width: 200px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <script>
      function calcul(op) {
        let num1 = document.getElementById("num1");
        let num2 = document.getElementById("num2");
        let x = Number(num1.value);
        let y = Number(num2.value);

        if (op == "+") {
          alert(x + y);
        } else if (op == "-") {
          alert(x - y);
        } else if (op == "*") {
          alert(x * y);
        } else if (op == "/") {
          alert(x / y);
        }
      }
    </script>

    <form action="">
      Number1
      <input type="text" id="num1" /><br />
      Number2
      <input type="text" id="num2" /><br />
      <button onclick="calcul('+')">+</button>
      <button onclick="calcul('-')">-</button>
      <button onclick="calcul('*')">x</button>
      <button onclick="calcul('/')">/</button>
    </form>
  </body>
</html>
