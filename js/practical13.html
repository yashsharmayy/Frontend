<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>practical_13</title>
    <style>
      form {
        border: 2px solid black;
        width: 200px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <script>
      function change(el) {
        el.style.backgroundColor = "blue";
      }
      function Reset(el) {
        el.style.backgroundColor = "white";
      }
    </script>

    <form action="">
      text1
      <input
        type="text"
        onfocus="this.style.backgroundColor = 'red'"
        onblur="this.style.backgroundColor = 'white'"
      /><br />
      text2
      <input
        type="text"
        id="text2"
        onfocus="change(this)"
        onblur="Reset(this)"
      /><br />
    </form>
  </body>
</html>
