<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <style>
      table,
      td {
        text-align: center;
        padding: 10px;
        border-collapse: collapse;
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Table example
      </caption>
      <hr />
      <tr>
        <td colspan="4">Seminar</td>
      </tr>
      <tr>
        <td rowspan="2">Day</td>
        <td colspan="2">schedule</td>
        <td rowspan="2">topic</td>
      </tr>
      <tr>
        <td>start time</td>
        <td>end time</td>
      </tr>
      <tr>
        <td rowspan="2">monday</td>
        <td rowspan="2">8am</td>
        <td rowspan="2">5pm</td>
        <td>inroduction to html</td>
      </tr>
      <tr>
        <td>inroduction to html</td>
      </tr>
      <tr>
        <td rowspan="3">monday</td>
        <td>8am</td>
        <td>5pm</td>
        <td rowspan="2">css1</td>
      </tr>
      <tr>
        <td>8am</td>
        <td>5pm</td>
      </tr>
      <tr>
        <td>8am</td>
        <td>5pm</td>
        <td>javascript</td>
      </tr>
    </table>
  </body>
</html>
