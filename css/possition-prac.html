<!DOCTYPE html>
<html>
<head>
    <title>position-practice</title>
    
</head>
<body style="height: 3000px;"> 
<style>

.slide-bar{
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 66px;
            width: 78px;
            left: 0;
            bottom: 0;
            background-color: rgb(48, 47, 48);
            padding-top: 10px;
            
        }
        .slide-img1{
            width: 50px;
            height: 50px;
            border-radius: 25px;
            margin: 7px;
            margin-left: 13px;

        }
        .info{
            position: fixed;
            background-color: rgb(78, 77, 77);
            display: flex;
            flex-direction: column;
            font-family: Arial, Helvetica, sans-serif;
            top: 66px;
            width: 78px;
            left: 78px;
            bottom: 0;
            width: 190px;
            padding-top: 10px;
            padding-left: 25px;
        }
        .info1{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            height: 32px;
            color: gray;
            align-items: center;

        }
        .info-head{
            color: rgb(221, 219, 219);
        }
        .plus{
            margin-right: 25px;
            font-size: 25px;
           
        }
        .info2{
            color: rgb(164, 164, 164);
            margin-top: 0px
        }
        .close-botton{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 28px;
            top: -15px;
            left:  -15px;

            position: absolute;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 20px;
           display: flex;
           justify-content: center;
           align-items: center;
            background-color: black;
            padding: 2px;
           
        }
        .box{
            position: fixed;
            width: 320px;
            height: 180px;
            background-color: gray;
            right: 40px;
            font-family: Arial, Helvetica, sans-serif;
            bottom: 40px;

        }
        .vidio-time{
            position: absolute;
            background-color: black;
            color: white;
            padding: 4px;
            padding-left: 6px;
            bottom: 7px;
            right: 7px;
            padding-right: 6px;
            font-size: 15px;
        }
</style>

<div class="slide-bar">
    <img src="images/cat image.avif" class="slide-img1">
    <img src="images/bulldog-puppy.webp" class="slide-img1">
    <img src="images/Golden+Retrievers+dans+pet+care.jpeg" class="slide-img1">
</div>
<div class="info">
    <div class="info1">
        <p class="info-head">INFO</p>
        <p class="plus">+</p>
    </div>
    <div  class="info2">
        <p style="margin-top: 7px;">#  new-videos</p>
        <p>#  updates</p>
        <p>#  faq</p>
    </div>
</div>

<div class="box">
    <div class="close-botton">x</div>
    <div class="vidio-time">0:29</div>
</div>





        
</body>

</html>
