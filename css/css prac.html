<!doctype html>
<html>
  <head>
    <title>css prac</title>
  </head>
  <body style="padding-bottom: 1000px">
    <style>
      .overlay {
        position: fixed;
        top: 0;
        bottom: 0;
        right: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
        display: flex;
      }
      .model {
        position: fixed;

        background-color: white;
        width: 300px;

        padding: 20px;
        border-radius: 7px;
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>

    <div
      style="
        background-color: black;

        color: white;
        right: 20px;
        position: fixed;

        bottom: 20px;
      "
    >
      bottom-right
    </div>

    <div
      style="
        background-color: green;
        width: 100px;
        color: white;
        position: fixed;
        right: 20px;
        top: 0px;
        bottom: 0px;
      "
    >
      right sidebar
    </div>

    <div class="overlay">
      <div class="model">
        <p style="font-size: 25px; margin-bottom: 10px; font-weight: bold">
          Modal title
        </p>
        <p>This is a modal</p>
        <button>Close</button>
      </div>
    </div>
  </body>
</html>
